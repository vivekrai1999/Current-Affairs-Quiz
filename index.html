<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>करंट अफेयर्स टेस्ट</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    color: #222;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }
  .container {
    max-width: 750px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 28px;
    color: #333;
    margin-bottom: 4px;
  }
  .header-sub { font-size: 14px; color: #888; }

  /* Start Screen */
  #start-area { text-align: center; padding: 40px 0; }
  #start-area h2 {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    margin-bottom: 12px;
  }
  #start-area p { color: #666; font-size: 14px; margin-bottom: 24px; }
  .start-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
  }
  .start-btn:hover { background: #1d4ed8; }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat {
    flex: 1;
    min-width: 70px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-value.green { color: #16a34a; }
  .stat-value.red { color: #dc2626; }
  .stat-value.blue { color: #2563eb; }
  .stat-value.gray { color: #888; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

  /* Progress Bar */
  .progress-bar {
    height: 6px;
    background: #e0e0e0;
    border-radius: 6px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 6px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
  }

  /* Quiz Card */
  .quiz-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-num {
    font-size: 13px;
    font-weight: 600;
    color: #2563eb;
    margin-bottom: 12px;
  }
  .q-text {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 17px;
    line-height: 1.8;
    color: #222;
    margin-bottom: 20px;
  }

  /* Options */
  .options { display: grid; gap: 8px; }
  .option {
    background: #fafafa;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 15px;
    line-height: 1.6;
    text-align: left;
    color: #333;
    transition: border-color 0.15s;
  }
  .option:hover:not(.disabled) { border-color: #2563eb; background: #f0f4ff; }
  .option.disabled { cursor: default; }
  .option.correct { border-color: #16a34a; background: #f0fdf4; color: #166534; }
  .option.wrong { border-color: #dc2626; background: #fef2f2; color: #991b1b; }
  .opt-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .option.correct .opt-letter { background: #16a34a; color: #fff; }
  .option.wrong .opt-letter { background: #dc2626; color: #fff; }

  /* Explanation */
  .explanation {
    margin-top: 14px;
    padding: 12px 16px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    font-size: 14px;
    color: #166534;
    display: none;
    font-family: 'Tiro Devanagari Hindi', serif;
    line-height: 1.6;
  }
  .explanation.show { display: block; }
  .explanation strong { display: block; margin-bottom: 2px; font-family: 'Inter', sans-serif; font-size: 12px; }

  /* Nav Buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }
  .btn-primary { background: #2563eb; color: #fff; flex: 1; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #fff; color: #333; border: 1px solid #d1d5db; }
  .btn-secondary:hover { border-color: #2563eb; color: #2563eb; }
  .btn-skip { background: #fff; color: #dc2626; border: 1px solid #fecaca; }
  .btn-skip:hover { background: #fef2f2; }
  .btn-finish { background: #fff; color: #dc2626; border: 1px solid #fecaca; width: 100%; margin-top: 12px; }
  .btn-finish:hover { background: #fef2f2; }

  /* Result Screen */
  .result-screen { display: none; text-align: center; padding: 40px 0; }
  .result-screen.show { display: block; }
  .result-score { font-size: 64px; font-weight: 700; color: #2563eb; }
  .result-msg { font-family: 'Tiro Devanagari Hindi', serif; font-size: 22px; margin: 8px 0 4px; }
  .result-sub { color: #888; font-size: 14px; margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; }
  .result-stat { text-align: center; }
  .result-stat-val { font-size: 28px; font-weight: 700; }
  .result-stat-lbl { font-size: 12px; color: #888; }

  #quiz-area { display: none; }
  #quiz-area.show { display: block; }
  #start-area.hidden { display: none; }

  @media (max-width: 600px) {
    .quiz-card { padding: 16px; }
    .stats-bar { gap: 6px; }
    .stat { padding: 8px 4px; }
    .stat-value { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>करंट अफेयर्स टेस्ट</h1>
    <div class="header-sub">कुल 450 प्रश्न</div>
  </div>

  <div id="start-area">
    <h2>टेस्ट शुरू करें</h2>
    <p>450 प्रश्नों का करंट अफेयर्स टेस्ट।<br>सही उत्तर चुनें और अपना स्कोर जानें।</p>
    <button class="start-btn" onclick="startQuiz()">टेस्ट शुरू करें</button>
  </div>

  <div id="quiz-area">
    <div class="stats-bar">
      <div class="stat"><div class="stat-value blue" id="stat-score">0</div><div class="stat-label">Score</div></div>
      <div class="stat"><div class="stat-value green" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
      <div class="stat"><div class="stat-value red" id="stat-wrong">0</div><div class="stat-label">Wrong</div></div>
      <div class="stat"><div class="stat-value gray" id="stat-rem">—</div><div class="stat-label">Remaining</div></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label">
      <span id="progress-text">Question 1</span>
      <span id="progress-pct">0%</span>
    </div>

    <div class="quiz-card" id="quiz-card">
      <div class="q-num" id="q-num">Q 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" onclick="prevQ()">पिछला</button>
      <button class="btn btn-skip" onclick="skipQ()">छोड़ें</button>
      <button class="btn btn-primary" onclick="nextQ()">अगला</button>
    </div>
    <button class="btn btn-finish" onclick="confirmFinish()">टेस्ट समाप्त करें</button>
  </div>

  <div class="result-screen" id="result-screen">
    <div class="result-score" id="result-score-display">0%</div>
    <div class="result-msg" id="result-msg">शानदार प्रदर्शन!</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-grid">
      <div class="result-stat"><div class="result-stat-val green" id="r-correct">0</div><div class="result-stat-lbl">Correct</div></div>
      <div class="result-stat"><div class="result-stat-val red" id="r-wrong">0</div><div class="result-stat-lbl">Wrong</div></div>
      <div class="result-stat"><div class="result-stat-val gray" id="r-skipped">0</div><div class="result-stat-lbl">Skipped</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="restartQuiz()">फिर से खेलें</button>
      <button class="btn btn-secondary" onclick="reviewAnswers()">उत्तर देखें</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
// Section 0: Rajasthan (Q1-30)
  {s:0,q:"राजस्थान रोजगार नीति - 2026 के तहत मार्च 2029 तक कितने रोजगार के अवसर प्रदान करने का लक्ष्य रखा गया है?",o:["10 लाख","12 लाख","15 लाख","20 लाख"],a:2},
  {s:0,q:"राजस्थान युवा एवं खेल महोत्सव 2026 कहाँ और कब आयोजित किया गया?",o:["जोधपुर, 5-10 जनवरी","जयपुर, 7-12 जनवरी","उदयपुर, 10-15 जनवरी","कोटा, 12-17 जनवरी"],a:1},
  {s:0,q:"मुख्यमंत्री युवा स्वरोजगार योजना के तहत स्नातक एवं उच्च शैक्षणिक योग्यता वाले आवेदकों को विनिर्माण क्षेत्र के लिए कितने तक का ऋण प्रदान किया जाएगा?",o:["5 लाख","7.5 लाख","10 लाख","12 लाख"],a:2},
  {s:0,q:"राजस्थान सेमीकंडक्टर पॉलिसी के संबंध में कौन सा कथन सही है? (1) यह प्रदेश की पहली सेमीकंडक्टर पॉलिसी है (2) इसके तहत सात वर्षों तक विद्युत शुल्क से 100% छूट दी जाएगी (3) इसमें पूंजीगत निवेश के लिए 10% ब्याज अनुदान प्रदान किया जाएगा",o:["केवल 1 और 2","केवल 1 और 3","केवल 2 और 3","1, 2 और 3"],a:0},
  {s:0,q:"जयपुर डिस्कॉम को किस उपलब्धि के लिए राज्य का पहला 'दोषपूर्ण मीटर-मुक्त' वितरण निगम घोषित किया गया?",o:["1 वर्ष में 1 लाख मीटर बदले","2 वर्षों में 2.78 लाख खराब मीटर बदले","3 वर्षों में 3 लाख मीटर बदले","1 वर्ष में 50,000 मीटर बदले"],a:1},
  {s:0,q:"'राज उन्नति' मंच किस केंद्रीय योजना की तर्ज पर स्थापित किया गया है?",o:["प्रधानमंत्री ग्राम सड़क योजना","PM प्रगति","डिजिटल इंडिया","स्टार्टअप इंडिया"],a:1},
  {s:0,q:"राजस्थान डेटा सेंटर नीति 2025 के तहत निम्नलिखित में से कौन सा प्रोत्साहन प्रदान नहीं किया गया है?",o:["10 वर्षों के लिए 10-20 करोड़ रुपये का वार्षिक एसेट क्रिएशन इंसेंटिव","5 वर्षों के लिए 10% ब्याज सब्सिडी","ट्रांसमिशन शुल्क पर 100% छूट","100 करोड़ से अधिक निवेश पर 25% अतिरिक्त सनराइज इंसेंटिव"],a:1,exp:"5% ब्याज सब्सिडी है, 10% नहीं।"},
  {s:0,q:"राजस्थान में i-स्टार्टअप के तहत कितने पंजीकृत स्टार्टअप हैं और कितना निवेश हुआ है?",o:["5,000 स्टार्टअप, ₹500 करोड़","7,200 स्टार्टअप, ₹1,000 करोड़","10,000 स्टार्टअप, ₹2,000 करोड़","8,500 स्टार्टअप, ₹1,500 करोड़"],a:1},
  {s:0,q:"राजस्थान युवा नीति-2026 के प्रमुख सिद्धांतों में निम्नलिखित में से कौन सा शामिल नहीं है?",o:["मानवाधिकार","भेदभाव-रहितता","एकरूपता","सुलभता"],a:2,exp:"एकरूपता नहीं, विविधता है।"},
  {s:0,q:"'राजस्थान प्रोहिबिशन ऑफ ट्रांसफर ऑफ इम्पूवेबल प्रॉपर्टीज... बिल, 2026' के तहत अशांत क्षेत्र घोषित करने के बाद अचल संपत्ति हस्तांतरण के लिए क्या प्रावधान किया?",o:["पूर्ण प्रतिबंध","सक्षम प्राधिकारी की पूर्वानुमति अनिवार्य","केवल स्थानीय निवासियों को अनुमति","बिना शर्त हस्तांतरण जारी"],a:1},
  {s:0,q:"राजस्थान लोक सेवा आयोग सेवा नियम, 1991 में संशोधन के अनुसार, सहायक सचिव एवं निजी सचिव संवर्ग से उप सचिव के पद पर पदोन्नति किस अनुपात में होगी?",o:["5:1","10:1","15:1","20:1"],a:1},
  {s:0,q:"राजस्थान सिविल सेवा (आचरण) नियम, 1971 में संशोधन के अनुसार, बाल विवाह की परिभाषा के तहत बालक और बालिका की आयु सीमा क्या है?",o:["18 वर्ष से कम पुरुष, 18 वर्ष से कम महिला","21 वर्ष से कम पुरुष, 18 वर्ष से कम महिला","21 वर्ष से कम पुरुष, 21 वर्ष से कम महिला","18 वर्ष से कम पुरुष, 21 वर्ष से कम महिला"],a:1},
  {s:0,q:"'माई करियर एडवाइजर' ऐप किन कक्षाओं के छात्रों के लिए विकसित किया गया है?",o:["कक्षा 6-10","कक्षा 8-12","कक्षा 9-12","कक्षा 10-12"],a:2},
  {s:0,q:"एकीकृत क्लस्टर विकास योजना के तहत किस जिले में सोनामुखी प्रसंस्करण क्लस्टर विकसित किया गया है?",o:["बालोतरा","फलोदी","जयपुर","चुरू"],a:1},
  {s:0,q:"माँ योजना (स्वास्थ्य) के अंतर्गत कितने अस्पताल सूचीबद्ध हैं और कितने परिवार लाभान्वित होते हैं?",o:["20,000 अस्पताल, 1 करोड़ परिवार","25,000 अस्पताल, 1.2 करोड़ परिवार","30,000 अस्पताल, 1.36 करोड़ परिवार","35,000 अस्पताल, 1.5 करोड़ परिवार"],a:2},
  {s:0,q:"राजस्थान के किस जिले को खाद्य सुरक्षा सूचकांक में शीर्ष स्थान (स्कोर 83.64) प्राप्त हुआ?",o:["जयपुर","झुंझुनूं","उदयपुर","जोधपुर"],a:1},
  {s:0,q:"राजस्थान युवा नीति-2026 के तहत नोडल एजेंसी किसे बनाया गया है?",o:["राजस्थान युवा बोर्ड","खेल एवं युवा मामलात मंत्रालय","राजस्थान कौशल विकास मिशन","राजस्थान रोजगार निगम"],a:0},
  {s:0,q:"राजस्थान सरकार ने PM किसान सम्मान निधि के ₹6,000 के अतिरिक्त कितनी सहायता देने की घोषणा की?",o:["₹2,000","₹3,000","₹4,000","₹5,000"],a:1},
  {s:0,q:"'अपना खाता मोबाइल एप' किस मंत्री द्वारा लॉन्च किया गया?",o:["मुख्यमंत्री भजनलाल शर्मा","राजस्व मंत्री हेमंत मीणा","वित्त मंत्री दिया कुमारी","गृह मंत्री जोगाराम पटेल"],a:1},
  {s:0,q:"जयपुर जिले के पंच गौरव के संदर्भ में कौन सा युग्म सही सुमेलित नहीं है?",o:["उपज - गेहूं","प्रजाति - लेसुआ","उत्पाद - रत्नाभूषण","खेल - क्रिकेट"],a:3,exp:"खेल - कबड्डी है, क्रिकेट नहीं।"},
  {s:0,q:"राजस्थान में PM श्री योजना के तहत कुल कितने विद्यालयों को सेंटर ऑफ एक्सीलेंस के रूप में विकसित किया जा रहा है?",o:["500","600","639","700"],a:2},

  {s:30,q:"भारत-यूरोपीय संघ FTA के तहत, 'सर्वोपरि राष्ट्र (MFN)' प्रावधान समझौते के लागू होने के समय से सक्रिय होगा और कितने वर्षों तक सक्रिय रहेगा?",o:["3 वर्ष", "4 वर्ष", "5 वर्ष", "6 वर्ष"],a:2},
  {s:30,q:"भारत और यूरोपीय संघ के संयुक्त बाजार का अनुमानित मूल्य कितना है?",o:["10 ट्रिलियन अमेरिकी डॉलर", "15 ट्रिलियन अमेरिकी डॉलर", "20 ट्रिलियन अमेरिकी डॉलर", "24 ट्रिलियन अमेरिकी डॉलर"],a:3}
];

let questions = [];
let currentIdx = 0;
let answered = {};

function startQuiz() {
  questions = [...ALL_QUESTIONS];
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIdx = 0;
  answered = {};
  document.getElementById('start-area').classList.add('hidden');
  document.getElementById('quiz-area').classList.add('show');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  const done = Object.keys(answered).length;
  let correct = 0, wrong = 0;
  Object.values(answered).forEach(r => r.correct ? correct++ : wrong++);
  document.getElementById('stat-score').textContent = correct;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-rem').textContent = total - done;

  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = 'Question ' + (currentIdx + 1) + ' of ' + total;
  document.getElementById('progress-pct').textContent = pct + '%';

  document.getElementById('q-num').textContent = 'Q ' + String(currentIdx + 1).padStart(2, '0');
  document.getElementById('q-text').textContent = q.q;

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = ['A','B','C','D'];
  const isAnswered = answered[currentIdx] !== undefined;

  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    if (isAnswered) {
      btn.classList.add('disabled');
      if (i === q.a) btn.classList.add('correct');
      else if (i === answered[currentIdx].selected) btn.classList.add('wrong');
    }
    btn.innerHTML = '<span class="opt-letter">' + letters[i] + '</span><span>' + opt + '</span>';
    if (!isAnswered) btn.onclick = () => selectAnswer(i);
    optContainer.appendChild(btn);
  });

  const exp = document.getElementById('explanation');
  if (isAnswered && q.exp) {
    exp.innerHTML = '<strong>व्याख्या</strong>' + q.exp;
    exp.classList.add('show');
  } else if (isAnswered) {
    exp.innerHTML = '<strong>सही उत्तर</strong>' + q.o[q.a];
    exp.classList.add('show');
  } else {
    exp.classList.remove('show');
  }
}

function selectAnswer(selected) {
  const q = questions[currentIdx];
  answered[currentIdx] = { selected, correct: selected === q.a };
  renderQuestion();
}

function skipQ() { if (currentIdx < questions.length - 1) { currentIdx++; renderQuestion(); } }
function nextQ() { if (currentIdx < questions.length - 1) { currentIdx++; renderQuestion(); } else { showResult(); } }
function prevQ() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }

function confirmFinish() {
  const unanswered = questions.length - Object.keys(answered).length;
  if (unanswered > 0) {
    if (!confirm(unanswered + ' प्रश्न अनुत्तरित हैं। क्या आप टेस्ट समाप्त करना चाहते हैं?')) return;
  }
  showResult();
}

function showResult() {
  let correct = 0, wrong = 0;
  Object.values(answered).forEach(r => r.correct ? correct++ : wrong++);
  const skipped = questions.length - correct - wrong;
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('quiz-area').classList.remove('show');
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');
  document.getElementById('result-score-display').textContent = pct + '%';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skipped').textContent = skipped;
  let msg, sub;
  if (pct >= 90) { msg = "अद्भुत प्रदर्शन!"; sub = "आप एक विशेषज्ञ हैं!"; }
  else if (pct >= 75) { msg = "शानदार प्रयास!"; sub = "बहुत अच्छा किया!"; }
  else if (pct >= 60) { msg = "अच्छा प्रदर्शन!"; sub = "थोड़ी और मेहनत करें।"; }
  else if (pct >= 40) { msg = "ठीक-ठाक प्रयास"; sub = "अभी और पढ़ाई की जरूरत है।"; }
  else { msg = "हिम्मत रखें!"; sub = "अभ्यास से सब हो जाता है।"; }
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = correct + ' / ' + questions.length + ' सही • ' + sub;
}

function restartQuiz() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('start-area').classList.remove('hidden');
  document.getElementById('quiz-area').classList.remove('show');
  answered = {};
}

function reviewAnswers() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').classList.add('show');
  currentIdx = 0;
  renderQuestion();
}
</script>
